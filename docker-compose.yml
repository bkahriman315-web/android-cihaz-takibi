version: '3.9'

services:
  postgresql:
    image: postgres:16-alpine
    container_name: phonehub-db
    environment:
      POSTGRES_DB: phonehub_db
      POSTGRES_USER: phonehub_user
      POSTGRES_PASSWORD: PhoneHub@123456
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/PhoneHub.API/SqlScripts:/docker-entrypoint-initdb.d
    networks:
      - phonehub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phonehub_user -d phonehub_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: phonehub-cache
    ports:
      - "6379:6379"
    networks:
      - phonehub-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phonehub-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORT: 5000
      ASPNETCORE_HTTPS_PORT: 7001
      ASPNETCORE_URLS: https://+:7001;http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgresql;Port=5432;Database=phonehub_db;Username=phonehub_user;Password=PhoneHub@123456"
      Redis__Connection: "redis:6379"
      Jwt__Secret: "SuperSecretKeyThatIsAtLeast32CharactersLongForHS256Encryption!"
      Jwt__Issuer: "PhoneHub.API"
      Jwt__Audience: "PhoneHub.Client"
    ports:
      - "5000:5000"
      - "7001:7001"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - phonehub-network
    volumes:
      - ~/.microsoft/usersecrets:/root/.microsoft/usersecrets:ro
    restart: unless-stopped

networks:
  phonehub-network:
    driver: bridge

volumes:
  postgres-data:
